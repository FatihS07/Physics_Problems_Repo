<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS02 Task 01 - Uniformly Accelerated Motion</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Left Panel */
        #controls {
            width: 300px;
            padding: 20px;
            background: #eee;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            font-weight: bold;
            font-size: 0.9em;
        }
        .val-display {
            font-family: monospace;
            color: #d32f2f;
            float: right;
        }
        /* Right Panel */
        #visualization {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
        }
        canvas {
            border: 1px solid #ddd;
            background: #fafafa;
            width: 100%;
        }
        #anim-canvas {
            height: 120px;
        }
        .graph-container {
            flex: 1;
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 10px;
        }
        .info-box {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.85em;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<header>
    PS02 Task 01 — Uniformly Accelerated Motion
</header>

<div class="main-container">
    <div id="controls">
        <section>
            <h2>Parameters</h2>
            <div class="control-group">
                <label>Initial Position $x_0$ [m]: <span id="x0-val" class="val-display">0</span></label>
                <input type="range" id="x0-slider" min="-50" max="50" step="1" value="0">
            </div>
            <div class="control-group">
                <label>Initial Velocity $v_0$ [m/s]: <span id="v0-val" class="val-display">5</span></label>
                <input type="range" id="v0-slider" min="-20" max="20" step="0.5" value="5">
            </div>
            <div class="control-group">
                <label>Acceleration $a$ [m/s²]: <span id="a-val" class="val-display">-2</span></label>
                <input type="range" id="a-slider" min="-10" max="10" step="0.1" value="-2">
            </div>
        </section>

        <section>
            <h2>Simulation Controls</h2>
            <button id="btn-start">Start / Pause</button>
            <button id="btn-reset">Reset</button>
        </section>

        <section id="results" class="info-box">
            <strong>Calculated Values:</strong><br>
            Stopping Time ($v=0$): <span id="stop-time-val">-</span> s<br>
            Max Displacement: <span id="max-disp-val">-</span> m
        </section>
    </div>

    <div id="visualization">
        <canvas id="anim-canvas"></canvas>
        <div class="graph-container">
            <canvas id="graph-x"></canvas>
            <canvas id="graph-v"></canvas>
            <canvas id="graph-a"></canvas>
        </div>
    </div>
</div>

<script>
    // --- Configuration & Parameters ---
    const params = {
        x0: 0,
        v0: 5,
        a: -2
    };

    // --- State ---
    let state = {
        t: 0,
        running: false,
        history: [] // Array of {t, x, v, a}
    };

    const animCanvas = document.getElementById('anim-canvas');
    const ctxAnim = animCanvas.getContext('2d');
    const gXCanvas = document.getElementById('graph-x');
    const gVCanvas = document.getElementById('graph-v');
    const gACanvas = document.getElementById('graph-a');

    // --- Physics Model ---
    function getX(t) { return params.x0 + params.v0 * t + 0.5 * params.a * t * t; }
    function getV(t) { return params.v0 + params.a * t; }
    function getA(t) { return params.a; }

    function updateCalculations() {
        const stopTimeDisplay = document.getElementById('stop-time-val');
        const maxDispDisplay = document.getElementById('max-disp-val');
        
        if (params.a !== 0) {
            const ts = -params.v0 / params.a;
            if (ts > 0) {
                stopTimeDisplay.innerText = ts.toFixed(2);
                maxDispDisplay.innerText = Math.abs(getX(ts) - params.x0).toFixed(2);
            } else {
                stopTimeDisplay.innerText = "N/A (moving away)";
                maxDispDisplay.innerText = "∞";
            }
        } else {
            stopTimeDisplay.innerText = "N/A (a=0)";
            maxDispDisplay.innerText = "∞";
        }
    }

    // --- Rendering ---
    function draw() {
        // Resize canvases to fit container
        [animCanvas, gXCanvas, gVCanvas, gACanvas].forEach(c => {
            if (c.width !== c.clientWidth || c.height !== c.clientHeight) {
                c.width = c.clientWidth;
                c.height = c.clientHeight;
            }
        });

        // 1. Draw Animation
        ctxAnim.clearRect(0, 0, animCanvas.width, animCanvas.height);
        const centerX = animCanvas.width / 2;
        const centerY = animCanvas.height / 2;
        const scale = 5; // pixels per meter

        // Axis
        ctxAnim.beginPath();
        ctxAnim.moveTo(0, centerY + 20);
        ctxAnim.lineTo(animCanvas.width, centerY + 20);
        ctxAnim.stroke();

        // Object
        const currentX = getX(state.t);
        ctxAnim.fillStyle = 'blue';
        ctxAnim.beginPath();
        ctxAnim.arc(centerX + currentX * scale, centerY + 5, 10, 0, Math.PI * 2);
        ctxAnim.fill();
        
        ctxAnim.fillStyle = 'black';
        ctxAnim.fillText(`x = ${currentX.toFixed(2)}m`, centerX + currentX * scale - 20, centerY - 15);
        ctxAnim.fillText(`t = ${state.t.toFixed(2)}s`, 10, 20);

        // 2. Draw Graphs
        drawGraph(gXCanvas, 'x(t) [m]', h => h.x, '#2196F3');
        drawGraph(gVCanvas, 'v(t) [m/s]', h => h.v, '#4CAF50');
        drawGraph(gACanvas, 'a(t) [m/s²]', h => h.a, '#F44336');
    }

    function drawGraph(canvas, label, valueFunc, color) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (state.history.length < 2) return;

        const padding = 30;
        const w = canvas.width - padding * 2;
        const h = canvas.height - padding * 2;

        // Find scale
        const vals = state.history.map(valueFunc);
        const maxT = state.history[state.history.length - 1].t;
        let minV = Math.min(...vals, 0);
        let maxV = Math.max(...vals, 0);
        if (minV === maxV) { minV -= 1; maxV += 1; }

        const getY = (val) => canvas.height - padding - ((val - minV) / (maxV - minV)) * h;
        const getX_coord = (t) => padding + (t / maxT) * w;

        // Axes
        ctx.strokeStyle = '#ccc';
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, canvas.height - padding);
        ctx.lineTo(canvas.width - padding, canvas.height - padding);
        ctx.stroke();

        // Curve
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        state.history.forEach((pt, i) => {
            const px = getX_coord(pt.t);
            const py = getY(valueFunc(pt));
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        });
        ctx.stroke();

        ctx.fillStyle = 'black';
        ctx.font = '10px Arial';
        ctx.fillText(label, padding, 15);
        ctx.fillText(maxV.toFixed(1), 5, getY(maxV) + 5);
        ctx.fillText(minV.toFixed(1), 5, getY(minV) + 5);
    }

    // --- Loop ---
    function loop() {
        if (state.running) {
            state.t += 0.016; // Approx 60fps
            state.history.push({
                t: state.t,
                x: getX(state.t),
                v: getV(state.t),
                a: getA(state.t)
            });
            // Limit history size for performance
            if (state.history.length > 2000) state.history.shift();
        }
        draw();
        requestAnimationFrame(loop);
    }

    // --- UI Handlers ---
    document.getElementById('x0-slider').oninput = e => {
        params.x0 = parseFloat(e.target.value);
        document.getElementById('x0-val').innerText = params.x0;
        updateCalculations();
        if (!state.running) resetSim();
    };
    document.getElementById('v0-slider').oninput = e => {
        params.v0 = parseFloat(e.target.value);
        document.getElementById('v0-val').innerText = params.v0;
        updateCalculations();
        if (!state.running) resetSim();
    };
    document.getElementById('a-slider').oninput = e => {
        params.a = parseFloat(e.target.value);
        document.getElementById('a-val').innerText = params.a;
        updateCalculations();
        if (!state.running) resetSim();
    };

    document.getElementById('btn-start').onclick = () => {
        state.running = !state.running;
    };

    function resetSim() {
        state.t = 0;
        state.history = [{ t: 0, x: getX(0), v: getV(0), a: getA(0) }];
        updateCalculations();
    }

    document.getElementById('btn-reset').onclick = resetSim;

    // Init
    updateCalculations();
    resetSim();
    loop();

</script>
</body>
</html>
